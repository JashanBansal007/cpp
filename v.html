<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sakshi Ka Call Kb Ayega</title>
    <style>
        body {
            background: linear-gradient(135deg, #f8ffae 0%, #43c6ac 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .marquee-container {
            width: 80vw;
            max-width: 600px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            background: rgba(255,255,255,0.7);
            border-radius: 30px;
            box-shadow: 0 8px 32px 0 rgba(31,38,135,0.37);
        }
        .marquee-text {
            font-size: 2rem;
            font-weight: bold;
            color: #2c3e50;
            white-space: nowrap;
            animation: marquee 7s linear infinite;
            font-family: 'Segoe UI', Arial, sans-serif;
            letter-spacing: 2px;
            text-shadow: 1px 1px 8px #fff, 0 0 10px #43c6ac44;
        }
        @keyframes marquee {
            0% {
                transform: translateX(100%);
            }
            100% {
                transform: translateX(-100%);
            }
        }
    </style>
</head>
<body>
    <div class="marquee-container">
        <div class="marquee-text">
            Sakshi Ka Call Kb Ayega
        </div>
    </div>
</body>
</html>
